name: Full Stack CI Pipeline

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:

  frontend:

    name: Frontend

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Frontend Packages
        run: npm install

      - name: Run Frontend Tests
        run: npm test
        continue-on-error: true

  backend:

    name: Backend

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Backend Packages
        run: npm install

      - name: Run Backend Tests
        run: npm test
        continue-on-error: true

  database:

    name: Database

    runs-on: ubuntu-latest

    services:

      postgres:

        image: postgres:17

        env:

          POSTGRES_USER: admin

          POSTGRES_PASSWORD: admin123

          POSTGRES_DB: employee

        ports:

          - 5432:5432

        options: >-
          --health-cmd="pg_isready -U admin"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Verify Database
        run: echo "PostgreSQL is running"

      - name: List Database Files
        run: ls database

  docker:

    name: Docker Build

    runs-on: ubuntu-latest

    needs:

      - frontend

      - backend

      - database

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build Docker Images
        run: docker compose build