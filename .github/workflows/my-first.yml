name: employee-management-frontend
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  frontend:
    name: frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3
      - name: setup node
        uses: actions/setup-node@v3
        with:
          node-version: 18
      - name: Install frontend packages
        run: npm install

  backend:
    name: backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3
      - name: setup node
        uses: actions/setup-node@v3
        with:
          node-version: 18
      - name: install backend packages
        run: npm install
  database:
    name: database
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: admin123
          POSTGRES_DB: employee
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U admin"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3
      - name: verify database
        run: echo "Database is up and running"
      - name: list database files
        run: ls 
  docker:
    name: docker
    runs-on: ubuntu-latest
    needs: [frontend, backend, database]
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3
      - name: build docker image
        run: docker compose build  
      - name: run docker compose
        run: docker compose up -d
      - name: stop docker compose
        run: docker compose down
  terraform:
    name: terraform
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3
      - name: terraform setup
        uses: hashicorp/setup-terraform@v3
      - name: terraform init
        run: terraform init
      - name: terraform plan check
        run: terraform plan
      - name: terraform validate
        run: terraform validate
      - name: terraform apply
        run: terraform apply
      - name: terraform destroy
        run: terraform destroy
        

