services:

  postgres:

    image: postgres:17-alpine

    container_name: company-postgres

    restart: always

    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: company

    ports:
      - "5432:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql

    networks:
      - company-network

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d company"]
      interval: 10s
      timeout: 5s
      retries: 5


  backend:

    build:
      context: ./backend

    container_name: company-backend

    restart: always

    depends_on:
      postgres:
        condition: service_healthy

    ports:
      - "3000:3000"

    networks:
      - company-network


  frontend:

    build:
      context: ./frontend

    container_name: company-frontend

    restart: always

    depends_on:
      - backend

    ports:
      - "8080:80"

    networks:
      - company-network


volumes:

  postgres-data:


networks:

  company-network:
    driver: bridge